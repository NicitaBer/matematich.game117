<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Контакты | Математические турниры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
            font-family: 'Courier New', 'Courier', 'IBM Plex Mono', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.05"><path fill="none" stroke="%23d4af37" stroke-width="0.5" d="M20 20 L180 20 M20 40 L180 40 M20 60 L180 60 M20 80 L180 80 M20 100 L180 100 M20 120 L180 120 M20 140 L180 140 M20 160 L180 160 M20 180 L180 180 M40 20 L40 180 M60 20 L60 180 M80 20 L80 180 M100 20 L100 180 M120 20 L120 180 M140 20 L140 180 M160 20 L160 180"/><circle cx="100" cy="100" r="15" stroke="%23d4af37" stroke-width="0.5" fill="none"/><path d="M100 85 L100 115 M85 100 L115 100" stroke="%23d4af37" stroke-width="0.5"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
        }

        .container {
            background: #2c2418;
            background-image: radial-gradient(circle at 25% 40%, rgba(80, 70, 50, 0.3) 2%, transparent 2.5%);
            background-size: 24px 24px;
            border-radius: 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            border: 1px solid #b89a6b;
            padding: 30px 20px 35px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .logo-wrapper {
            margin-bottom: 12px;
        }

        .logo {
            max-width: 320px;
            width: 100%;
            height: auto;
            display: inline-block;
        }

        .title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #eedbba;
            text-shadow: 3px 3px 0 #2a2418;
            letter-spacing: 2px;
            border-bottom: 2px solid #c7a25b;
            padding-bottom: 18px;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 30px;
        }

        .btn {
            background: #221f1a;
            background-image: linear-gradient(145deg, #2b241c, #19150f);
            border: 1px solid #c7a25b;
            border-radius: 60px;
            padding: 16px 20px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            font-weight: bold;
            color: #eedbba;
            text-shadow: 1px 1px 0 #231f18;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 6px 0 #0c0a07;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0c0a07;
        }

        .btn-telegram {
            border-color: #5b8cbf;
        }
        .btn-telegram:hover {
            background: #2a3f5a;
        }

        .btn-vk {
            border-color: #7a8ba8;
        }
        .btn-vk:hover {
            background: #3a4055;
        }

        .btn-max {
            border-color: #b89a6b;
        }
        .btn-max:hover {
            background: #4a3a2a;
        }

        .email-block {
            background: #1f1b14;
            border-radius: 60px;
            padding: 14px 20px;
            border: 1px solid #5f4e32;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .email-text {
            color: #dbbc87;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            word-break: break-all;
        }

        .btn-copy {
            background: #4a3a2a;
            border: none;
            border-radius: 40px;
            padding: 6px 18px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #f3e3c2;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 3px 0 #1f1b14;
            white-space: nowrap;
        }

        .btn-copy:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f1b14;
        }

        .badge {
            margin-top: 20px;
            font-size: 0.65rem;
            color: #7f6b48;
            border-top: 1px dashed #5f4e32;
            padding-top: 18px;
            font-family: monospace;
        }

        @media (max-width: 550px) {
            .container { padding: 30px 18px 25px; }
            .title { font-size: 1.5rem; }
            .btn { font-size: 1rem; padding: 14px 16px; }
            .email-block { flex-direction: column; gap: 10px; }
            .btn-copy { white-space: normal; }
            .logo { max-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="logo.png" alt="Логотип" class="logo" />
        </div>
        <div class="title">📡 НАШИ СОЦИАЛЬНЫЕ СЕТИ</div>

        <div class="btn-group">
            <a href="https://t.me/matematich_game117" target="_blank" class="btn btn-telegram">📱 Наш Telegram</a>
            <a href="https://vk.com/matematich_game117" target="_blank" class="btn btn-vk">📱 Наш VK</a>
            <a href="https://max.ru/join/RFUXg2NjTa5WCkgrixyAIuwNUEka_vEVtK-Lgk4u6pQ" target="_blank" class="btn btn-max">📱 Наш Max</a>
        </div>

        <div class="email-block">
            <span class="email-text" id="emailAddress">matematich.game117@yandex.ru</span>
            <button class="btn-copy" id="copyEmailBtn">📋 Скопировать адрес нашей почты</button>
        </div>

        <div class="badge">📧 Свяжитесь с нами по любым вопросам</div>
    </div>

    <script>
        document.getElementById('copyEmailBtn').addEventListener('click', function() {
            const email = document.getElementById('emailAddress').textContent;
            navigator.clipboard.writeText(email).then(() => {
                const originalText = this.textContent;
                this.textContent = '✅ Скопировано!';
                setTimeout(() => {
                    this.textContent = originalText;
                }, 2500);
            }).catch(() => {
                const textArea = document.createElement('textarea');
                textArea.value = email;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                textArea.remove();
                const originalText = this.textContent;
                this.textContent = '✅ Скопировано!';
                setTimeout(() => {
                    this.textContent = originalText;
                }, 2500);
            });
        });
    </script>
</body>
</html>
