<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Главная | Математические Игры 117</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.05"><path fill="none" stroke="%23d4af37" stroke-width="0.5" d="M20 20 L180 20 M20 40 L180 40 M20 60 L180 60 M20 80 L180 80 M20 100 L180 100 M20 120 L180 120 M20 140 L180 140 M20 160 L180 160 M20 180 L180 180 M40 20 L40 180 M60 20 L60 180 M80 20 L80 180 M100 20 L100 180 M120 20 L120 180 M140 20 L140 180 M160 20 L160 180"/><circle cx="100" cy="100" r="15" stroke="%23d4af37" stroke-width="0.5" fill="none"/><path d="M100 85 L100 115 M85 100 L115 100" stroke="%23d4af37" stroke-width="0.5"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
        }

        .container {
            background: #2c2418;
            background-image: radial-gradient(circle at 25% 40%, rgba(80,70,50,0.3) 2%, transparent 2.5%);
            background-size: 24px 24px;
            border-radius: 32px;
            box-shadow: 0 25px 35px rgba(0,0,0,0.5);
            border: 1px solid #b89a6b;
            padding: 40px 30px 45px;
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        .logo {
            margin-bottom: 35px;
        }
        .logo img {
            max-width: 100%;
            height: auto;
            max-height: 160px;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.2));
        }

        /* ===== КНОПКИ ===== */
        .btn {
            background: #221f1a;
            background-image: linear-gradient(145deg, #2b241c, #19150f);
            border: 2px solid #c7a25b;
            border-radius: 40px;
            padding: 16px 20px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0c0a07;
            transition: 0.1s;
            color: #eedbba;
            font-weight: bold;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            letter-spacing: 1px;
            gap: 12px;
            position: relative;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0c0a07;
        }
        .btn:hover {
            background: #3a2f1a;
            border-color: #d4af37;
            color: #f5e6b0;
        }

        .btn .icon {
            flex: 0 0 auto;
            order: 0;
        }
        .btn .icon-img {
            flex: 0 0 auto;
            height: 28px;
            width: auto;
            order: 0;
        }
        .btn .text {
            flex: 1;
            text-align: center;
        }

        .btn-row {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
        }
        .btn-row .btn {
            flex: 1;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 16px;
        }
        .btn-grid .btn {
            padding: 14px 16px;
            font-size: 0.85rem;
            flex-direction: row;
            gap: 10px;
        }
        .btn-grid .btn .icon-img {
            height: 28px;
            width: auto;
            flex-shrink: 0;
        }
        .btn-grid .btn .text {
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            line-height: 1.3;
            text-align: center;
        }

        .btn-email {
            padding: 14px 20px;
            gap: 12px;
            flex-wrap: nowrap;
            cursor: default;
            justify-content: space-between;
        }
        .btn-email .icon {
            font-size: 1.2rem;
            flex: 0 0 auto;
        }
        .btn-email .text {
            color: #f5e6b0;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            word-break: keep-all;
            white-space: nowrap;
            flex: 1;
            text-align: center;
            min-width: 0;
        }
        .btn-email .copy-btn {
            background: #3a2f1a;
            border: 1px solid #bda36b;
            border-radius: 40px;
            padding: 6px 18px;
            color: #eedbba;
            font-weight: bold;
            font-size: 0.7rem;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            flex: 0 0 auto;
        }
        .btn-email .copy-btn:hover {
            background: #5a4a2a;
            border-color: #d4af37;
            color: #f5e6b0;
        }
        .btn-email .copy-btn.copied {
            background: #2a5a2a;
            border-color: #7ad45a;
            color: #7ad45a;
        }

        .footer {
            color: #5f4e32;
            font-size: 0.65rem;
            border-top: 1px dashed #5f4e32;
            padding-top: 16px;
            margin-top: 25px;
            letter-spacing: 1px;
        }
        .footer .gold {
            color: #bda36b;
        }

        @media (max-width: 550px) {
            .container { padding: 24px 16px 30px; }
            .logo img { max-height: 100px; }
            .btn { font-size: 0.85rem; padding: 14px 12px; gap: 8px; }
            .btn .icon { font-size: 1rem; }
            .btn .icon-img { height: 24px; }
            .btn-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .btn-grid .btn { padding: 12px 8px; flex-direction: column; gap: 4px; }
            .btn-grid .btn .icon-img { height: 26px; }
            .btn-grid .btn .text { font-size: 0.55rem; }
            .btn-row { flex-direction: column; gap: 10px; }
            .btn-email { flex-wrap: wrap; justify-content: center; padding: 14px 16px; gap: 6px; }
            .btn-email .text { font-size: 0.75rem; white-space: normal; word-break: break-all; flex-basis: 100%; order: 1; }
            .btn-email .icon { order: 0; }
            .btn-email .copy-btn { order: 2; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <img src="logo.png" alt="Логотип Математические Игры 117">
    </div>

    <!-- ===== ДВЕ ГОРИЗОНТАЛЬНЫЕ КНОПКИ ===== -->
    <div class="btn-row">
        <a href="reg.html" class="btn">
            <span class="icon">📝</span>
            <span class="text">РЕГИСТРАЦИЯ НА МЕРОПРИЯТИЕ</span>
        </a>
        <a href="rasp.html" class="btn">
            <span class="icon">📅</span>
            <span class="text">РАСПИСАНИЕ</span>
        </a>
    </div>

    <!-- ===== ТРИ КНОПКИ В РЯД С ИЛЛЮСТРАЦИЯМИ СЛЕВА ===== -->
    <div class="btn-grid">
        <a href="https://t.me/matematich_game117" target="_blank" class="btn">
            <img src="tg.webp" alt="Telegram" class="icon-img">
            <span class="text">НАШ TELEGRAM КАНАЛ</span>
        </a>
        <a href="https://vk.com/matematich_game117" target="_blank" class="btn">
            <img src="vk.webp" alt="ВКонтакте" class="icon-img">
            <span class="text">НАША СТРАНИЦА ВК</span>
        </a>
        <a href="https://max.ru/join/RFUXg2NjTa5WCkgrixyAIuwNUEka_vEVtK-Lgk4u6pQ" target="_blank" class="btn">
            <img src="MAX.webp" alt="MAX" class="icon-img">
            <span class="text">НАШ MAX КАНАЛ</span>
        </a>
    </div>

    <!-- ===== КНОПКА С ПОЧТОЙ ===== -->
    <div class="btn btn-email" style="text-decoration: none; cursor: default;">
        <span class="icon">📧</span>
        <span class="text">matematich.game117@yandex.ru</span>
        <span class="copy-btn" id="copyEmailBtn" onclick="event.preventDefault(); copyEmail();">📋 СКОПИРОВАТЬ</span>
    </div>

    <div class="footer">
        <span class="gold">⚔️</span> МАТЕМАТИЧЕСКИЕ ИГРЫ <span class="gold">117</span>
    </div>
</div>

<script>
    function copyEmail() {
        const email = 'matematich.game117@yandex.ru';
        const btn = document.getElementById('copyEmailBtn');

        if (navigator.clipboard) {
            navigator.clipboard.writeText(email).then(() => {
                btn.textContent = '✅ СКОПИРОВАНО';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 СКОПИРОВАТЬ';
                    btn.classList.remove('copied');
                }, 2500);
            }).catch(() => {
                fallbackCopy(email, btn);
            });
        } else {
            fallbackCopy(email, btn);
        }
    }

    function fallbackCopy(text, btn) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            btn.textContent = '✅ СКОПИРОВАНО';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '📋 СКОПИРОВАТЬ';
                btn.classList.remove('copied');
            }, 2500);
        } catch (e) {
            alert('Не удалось скопировать. Выделите адрес вручную.');
        }
        document.body.removeChild(textarea);
    }

    // ===== ОБРАБОТКА ХЭША #survey =====
    if (window.location.hash === '#survey') {
        window.location.href = 'survey.html';
    }
    window.addEventListener('hashchange', function() {
        if (window.location.hash === '#survey') {
            window.location.href = 'survey.html';
        }
    });
</script>
</body>
</html>
