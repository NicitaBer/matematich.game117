<!DOCTYPE html>
<html lang="ru">
<head>
	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Расписание | Математические Игры 117</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.05"><path fill="none" stroke="%23d4af37" stroke-width="0.5" d="M20 20 L180 20 M20 40 L180 40 M20 60 L180 60 M20 80 L180 80 M20 100 L180 100 M20 120 L180 120 M20 140 L180 140 M20 160 L180 160 M20 180 L180 180 M40 20 L40 180 M60 20 L60 180 M80 20 L80 180 M100 20 L100 180 M120 20 L120 180 M140 20 L140 180 M160 20 L160 180"/><circle cx="100" cy="100" r="15" stroke="%23d4af37" stroke-width="0.5" fill="none"/><path d="M100 85 L100 115 M85 100 L115 100" stroke="%23d4af37" stroke-width="0.5"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
        }

        .container {
            background: #2c2418;
            background-image: radial-gradient(circle at 25% 40%, rgba(80,70,50,0.3) 2%, transparent 2.5%);
            background-size: 24px 24px;
            border-radius: 32px;
            box-shadow: 0 25px 35px rgba(0,0,0,0.5);
            border: 1px solid #b89a6b;
            padding: 30px 20px 35px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .crime-header {
            border-bottom: 2px solid #c7a25b;
            padding-bottom: 18px;
            margin-bottom: 28px;
        }
        .crime-header h1 {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #ecd9b4;
            text-shadow: 3px 3px 0 #2a2418;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #bda36b;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            border-bottom: 1px dashed #bda36b;
            padding-bottom: 2px;
            cursor: pointer;
            transition: 0.2s;
        }
        .back-link:hover {
            color: #f5e6b0;
            border-color: #f5e6b0;
        }

        .footer {
            color: #5f4e32;
            font-size: 0.6rem;
            border-top: 1px dashed #5f4e32;
            padding-top: 14px;
            margin-top: 20px;
            font-weight: 600;
        }

        .table-wrap {
            margin-top: 16px;
            overflow-x: auto;
            border-radius: 16px;
            border: 2px solid #d4af37;
            background: #0f0c08;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            background: linear-gradient(145deg, #2a1f12, #1a1008);
            color: #f5e6b0;
            padding: 12px 12px;
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 2px solid #d4af37;
            white-space: nowrap;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        td {
            padding: 10px 12px;
            border-bottom: 2px solid #3a3020;
            color: #ecd9b4;
            word-break: break-word;
            font-weight: 600;
        }
        tr:hover td {
            background: #1f1b14;
            box-shadow: inset 0 0 30px rgba(212, 175, 55, 0.05);
        }
        tr:last-child td {
            border-bottom: none;
        }
        .empty-row td {
            text-align: center;
            color: #5f4e32;
            padding: 40px 0;
            font-size: 1.1rem;
            font-weight: 400;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 10px 0;
            color: #5f4e32;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .stats .count {
            color: #bda36b;
        }
        .btn-sm {
            padding: 4px 14px;
            font-size: 0.7rem;
            border-radius: 40px;
            border: 1px solid #5f4e32;
            background: #1f1b14;
            color: #bda36b;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: 0.2s;
            font-weight: 700;
        }
        .btn-sm:hover {
            border-color: #d4af37;
            color: #f5e6b0;
            background: #2a1f12;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #2c2418;
            border: 2px solid #d4af37;
            border-radius: 32px;
            padding: 35px 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.15);
            animation: modalFade 0.3s ease;
        }
        @keyframes modalFade {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-box .modal-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .modal-box .modal-title {
            color: #f5e6b0;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .modal-box .modal-message {
            color: #dbbc87;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.5;
        }
        .modal-box .modal-btn {
            margin-top: 18px;
            background: #221f1a;
            background-image: linear-gradient(145deg, #2b241c, #19150f);
            border: 1px solid #c7a25b;
            border-radius: 40px;
            padding: 10px 35px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0c0a07;
            transition: 0.1s;
            color: #eedbba;
            font-weight: 700;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
        }
        .modal-box .modal-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0c0a07;
        }
        .modal-box .modal-btn:hover {
            background: #3a2f1a;
            border-color: #d4af37;
            color: #f5e6b0;
        }
        .modal-box.loading {
            border-color: #f3d06b;
        }
        .modal-box.loading .modal-icon {
            animation: spin 1.2s linear infinite;
        }
        .modal-box.error {
            border-color: #e88060;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 550px) {
            .container { padding: 20px 16px 25px; }
            .crime-header h1 { font-size: 1.2rem; }
            th, td { padding: 8px 8px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <!-- ===== МОДАЛЬНОЕ ОКНО ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" id="modalBox">
            <div class="modal-icon" id="modalIcon">⏳</div>
            <div class="modal-title" id="modalTitle">ЗАГРУЗКА...</div>
            <div class="modal-message" id="modalMessage">Пожалуйста, подождите</div>
            <button class="modal-btn" id="modalBtn">ПОНЯТНО</button>
        </div>
    </div>

    <div class="container">
        <div class="crime-header">
            <h1>📅 РАСПИСАНИЕ МЕРОПРИЯТИЙ</h1>
        </div>

        <div class="stats">
            <span>📌 ВСЕГО МЕРОПРИЯТИЙ: <strong class="count" id="countDisplay">0</strong></span>
            <button class="btn-sm" id="refreshBtn">🔄 ОБНОВИТЬ</button>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Мероприятие</th>
                        <th>Класс</th>
                        <th>Место</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row"><td colspan="4">Загрузка данных...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="back-link" onclick="goHome()">🏠 НА ГЛАВНУЮ</div>
        <div class="footer">⚔️ МАТЕМАТИЧЕСКИЕ ИГРЫ 117</div>
    </div>

    <script>
        // ===== НОВАЯ ССЫЛКА =====
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzpKz2v87bgU8c9iK9S3OCE-_onO4fLXKjiF1rrmkGRaPzF8xORsnALMNEPLrLAXk241A/exec';

        // ===== МОДАЛЬНОЕ ОКНО =====
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBox = document.getElementById('modalBox');
        const modalIcon = document.getElementById('modalIcon');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalBtn = document.getElementById('modalBtn');

        function showModal(icon, title, message, isError = false, isLoader = false) {
            modalIcon.textContent = icon;
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            
            if (isLoader) {
                modalBox.className = 'modal-box loading';
                modalBtn.style.display = 'none';
            } else {
                modalBox.className = 'modal-box ' + (isError ? 'error' : '');
                modalBtn.style.display = 'block';
            }
            
            modalOverlay.className = 'modal-overlay active';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function hideModal() {
            modalOverlay.classList.remove('active');
        }

        modalBtn.addEventListener('click', hideModal);
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay && !modalBox.classList.contains('loading')) {
                hideModal();
            }
        });

        // ===== ПЕРЕХОД НА ГЛАВНУЮ =====
        function goHome() {
            window.location.href = 'index.html';
        }

        // ===== ЗАГРУЗКА РАСПИСАНИЯ =====
        async function loadSchedule(showLoader = true) {
            if (showLoader) {
                showModal('⏳', 'ЗАГРУЗКА...', 'Пожалуйста, подождите', false, true);
            }

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL + '?type=schedule');
                const data = await response.json();
                renderTable(data || []);
                document.getElementById('countDisplay').textContent = (data || []).length;
                
                if (showLoader) {
                    hideModal();
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('tableBody').innerHTML = `<tr class="empty-row"><td colspan="4">Ошибка загрузки данных</td></tr>`;
                if (showLoader) {
                    hideModal();
                    showModal('❌', 'ОШИБКА', 'Не удалось загрузить расписание. Проверьте интернет.', true);
                }
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');

            if (data.length === 0) {
                tbody.innerHTML = `<tr class="empty-row"><td colspan="4">Нет мероприятий</td></tr>`;
                return;
            }

            let html = '';
            data.forEach((row) => {
                const date = row['Дата'] || '';
                const event = row['Мероприятие'] || '';
                const class_ = row['Класс'] || '';
                const place = row['Место'] || '';

                html += `
                    <tr>
                        <td>${escapeHtml(date)}</td>
                        <td><strong style="color:#f5e6b0;">${escapeHtml(event)}</strong></td>
                        <td>${escapeHtml(class_)}</td>
                        <td>${escapeHtml(place)}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        // ===== ОБНОВЛЕНИЕ =====
        document.getElementById('refreshBtn').addEventListener('click', function() {
            loadSchedule(true);
        });

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        loadSchedule(false);
    </script>
</body>
</html>
